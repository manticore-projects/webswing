// Convention plugin applied to all Java subprojects.
// Centralizes: toolchain, encoding, --add-exports/--add-opens, test config, dev profile.
//
// Usage: apply plugin: 'webswing.java-conventions'

plugins {
    id 'java-library'
    id 'maven-publish'
}

// ─── JDK 21 toolchain ───────────────────────────────────────────────
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// ─── Common --add-exports for compiler & test JVM ────────────────────
// Shared as project extensions so other plugins/scripts can reference them.
ext.jvmAddExports = [
    '--add-exports=java.desktop/sun.awt=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.awt.dnd=ALL-UNNAMED',
    '--add-exports=java.base/sun.nio.cs=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.java2d=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.java2d.pipe=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.java2d.loops=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.awt.datatransfer=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.awt.image=ALL-UNNAMED',
    '--add-exports=java.desktop/java.awt.peer=ALL-UNNAMED',
    '--add-exports=java.desktop/java.awt.dnd=ALL-UNNAMED',
    '--add-exports=java.desktop/java.awt.dnd.peer=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.awt.im=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.font=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.print=ALL-UNNAMED',
    '--add-exports=java.desktop/sun.awt.shell=ALL-UNNAMED',
    '--add-exports=java.base/sun.security.util=ALL-UNNAMED',
]

ext.jvmAddOpens = [
    '--add-opens=java.desktop/sun.java2d=ALL-UNNAMED',
    '--add-opens=java.desktop/sun.awt.image=ALL-UNNAMED',
    '--add-opens=java.desktop/sun.font=ALL-UNNAMED',
    '--add-opens=java.desktop/sun.awt=ALL-UNNAMED',
    '--add-opens=java.base/sun.security.util=ALL-UNNAMED',
]

ext.jvmAllModuleArgs = ext.jvmAddExports + ext.jvmAddOpens

// ─── Compiler settings ──────────────────────────────────────────────
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.deprecation = true
    options.compilerArgs.addAll(project.ext.jvmAddExports)
}

// ─── Test JVM args + dev profile ────────────────────────────────────
tasks.withType(Test).configureEach {
    jvmArgs(project.ext.jvmAllModuleArgs)
    if (project.hasProperty('dev')) {
        enabled = false
    }
}

// ─── Jar manifest ───────────────────────────────────────────────────
tasks.withType(Jar).configureEach {
    manifest {
        attributes('version': project.version)
    }
}

// ─── Common test dependency ─────────────────────────────────────────
dependencies {
    testImplementation 'junit:junit:4.13.2'
}
