dependencies {
    // provided in Maven — needed to compile against but should NOT
    // end up in swing-lib (it's already in swing-boot)
    compileOnly(project(':webswing-app-toolkit')) {
        exclude group: 'org.webswing', module: 'modpatch-jdk-jsobject'
    }
    implementation project(':webswing-app-launcher')
    implementation project(':webswing-directdraw:webswing-directdraw-swing')
    implementation(project(':webswing-server:webswing-server-common')) {
        exclude group: 'org.webswing', module: 'modpatch-jdk-jsobject'
    }

    implementation "org.glassfish.tyrus:tyrus-client:2.1.5"
    implementation "org.glassfish.tyrus:tyrus-container-jdk-client:2.1.3"
    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    implementation "commons-io:commons-io:${commonsIoVersion}"
    implementation "commons-codec:commons-codec:${commonsCodecVersion}"
    implementation "org.apache.commons:commons-lang3:${commonsLang3Version}"
    implementation 'org.apache.bcel:bcel:6.10.0'
    implementation "com.google.guava:guava:${guavaVersion}"
    implementation 'com.manticore-projects.tools:fpng-java:1.4.0'
    implementation 'com.manticore-projects.tools:fpnge-java:1.4.0'
    implementation "org.slf4j:slf4j-simple:${slf4jVersion}"
    implementation 'net.jpountz.lz4:lz4:1.3'

    testImplementation 'io.github.lukehutch:fast-classpath-scanner:2.18.1'
}

jar {
    archiveBaseName = 'webswing-app-services'
    archiveVersion = ''
}

// ── swing-lib: runtime deps MINUS what's already in swing-boot ───────
// In Maven, webswing-app-toolkit was <scope>provided</scope>, meaning toolkit
// and its transitives (webswing-api, modpatch-java-desktop) were excluded from
// the dependency copy. The plain toolkit-fx jar also leaks as a transitive of
// toolkit-fx-java11. We filter these out by filename pattern.
tasks.register('copySwingLib', Copy) {
    from(configurations.runtimeClasspath) {
        // Already in swing-boot — exclude from swing-lib
        exclude '**/webswing-api-*.jar'                   // transitive of toolkit
        exclude '**/modpatch-java-desktop-*.jar'          // transitive of toolkit
        exclude '**/webswing-app-toolkit-[0-9]*.jar'      // toolkit itself (won't match -fx- or -java11-)
        exclude '**/webswing-app-toolkit-fx-[0-9]*.jar'   // plain fx jar (won't match fx-java11-)
    }
    into layout.buildDirectory.dir('WEB-INF/swing-lib')
}

tasks.register('copyJarToSwingLib', Copy) {
    dependsOn jar
    from jar
    into layout.buildDirectory.dir('WEB-INF/swing-lib')
}

assemble.dependsOn 'copySwingLib', 'copyJarToSwingLib'

if (project.hasProperty('update')) {
    def warDir = rootProject.file("webswing-server/webswing-server-war/build/libs/exploded/${webswingWarName}")

    tasks.register('copyToRunningJetty', Copy) {
        dependsOn assemble
        from layout.buildDirectory.dir('WEB-INF')
        into "${warDir}/WEB-INF"
    }
    assemble.dependsOn 'copyToRunningJetty'
}
