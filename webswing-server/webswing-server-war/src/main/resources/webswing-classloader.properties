# ============================================================================
# webswing-classloader-whitelists.properties
#
# Defines which JARs each module classloader picks from WEB-INF/lib/.
# ALL JARs live in WEB-INF/lib/ (single copy, zero duplication).
# Main.java reads this at runtime to build filtered classloaders.
#
# Each key is a logical classloader role.
# Each value is a comma-separated list of glob patterns matched against
# JAR filenames.  Only matching JARs are loaded by that classloader;
# everything else is available via parent delegation to the shared
# classloader (which loads all of WEB-INF/lib/ unfiltered).
# ============================================================================

swing-boot = webswing-*.jar, modpatch-*.jar
swing-lib  = webswing-*.jar
server-lib = webswing-*.jar, log4j-slf4j2-impl*.jar, modpatch-*.jar

# ?? Swing child process classpath ?????????????????????????????????????
# Exactly the JARs that were originally in swing-boot/ + swing-lib/,
# plus fpng/fpnge (new, used by ImageServiceImpl in the child process).
# Everything else is server-only and excluded from the child JVM.
#
# Original swing-boot/:
#   webswing-app-launcher, webswing-app-toolkit, webswing-app-toolkit-fx,
#   webswing-app-toolkit-java11, webswing-app-toolkit-fx-java11,
#   webswing-api, modpatch-jdk-jsobject, modpatch-java-desktop
#
# Original swing-lib/ (additional):
#   webswing-server-common, webswing-directdraw-swing, webswing-app-services,
#   protobuf-java, jackson-{annotations,core,databind}, guava, guice,
#   commons-{lang3,io,collections4,codec}, failureaccess,
#   error_prone_annotations, j2objc-annotations, jspecify, listenablefuture,
#   jakarta.inject-api, aopalliance, jjwt-{api,impl,jackson}, slf4j-api, lz4
#
swing-classpath = \
    webswing-app-launcher*.jar, \
    webswing-app-toolkit*.jar, \
    webswing-app-services*.jar, \
    webswing-api-*.jar, \
    webswing-server-common-*.jar, \
    webswing-directdraw-swing-*.jar, \
    modpatch-*.jar, \
    protobuf-java-*.jar, \
    jackson-annotations-*.jar, jackson-core-*.jar, jackson-databind-*.jar, \
    guava-*.jar, guice-[0-9]*.jar, \
    commons-lang3-*.jar, commons-io-*.jar, \
    commons-collections4-*.jar, commons-codec-*.jar, \
    failureaccess-*.jar, error_prone_annotations-*.jar, \
    j2objc-annotations-*.jar, jspecify-*.jar, \
    listenablefuture-*.jar, aopalliance-*.jar, \
    jakarta.inject-api-*.jar, \
    jjwt-api-*.jar, jjwt-impl-*.jar, jjwt-jackson-*.jar, \
    slf4j-api-*.jar, lz4-*.jar, \
    zpng-java-*.jar