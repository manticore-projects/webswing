# ============================================================================
# webswing-classloader-whitelists.properties
#
# Single source of truth for JAR partitioning.
# Read by Main.java at runtime and build.gradle at build time.
#
# Each key is a WEB-INF subdirectory name.
# Each value is a comma-separated list of glob patterns.
# Only JARs matching these patterns stay in the module directory.
# Everything else is loaded from WEB-INF/lib/ (the shared classpath).
# ============================================================================

swing-boot = webswing-*.jar, modpatch-*.jar
swing-lib  = webswing-*.jar
server-lib = webswing-*.jar, log4j-slf4j2-impl*.jar, modpatch-*.jar