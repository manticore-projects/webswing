<!DOCTYPE html>
<html class="ws-fullscreen" lang="en">

<head>
    <title>VBox Login Error</title>
    <!--
        CSP: script-src 'self' blocks injected inline/external scripts.
        All JS lives in javascript/webswing-init.js — no unsafe-inline needed.
        connect-src includes ws:/wss: to allow the Webswing WebSocket connection.
        frame-src 'self' is required for the file-download iframe: the Java app
        writes a temp file and Webswing serves it via /file?id=... in an iframe;
        without this directive default-src 'none' blocks the frame and the
        browser never receives the download.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; connect-src 'self' ws: wss: data:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; worker-src blob:; frame-src 'self';">
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="icon" href="favicon.ico"/>
</head>

<body>
<div class="webswing-element">
    <div class="webswing-element-content">
        <div id="adminConsoleErrorDialog" class="ws-modal-container"
             role="dialog"
             aria-labelledby="adminConsoleErrorDialog-title"
             aria-describedby="adminConsoleErrorDialog-description">
            <div class="ws-dialog">
                <div data-id="header" class="ws-header">
                    <h2 id="adminConsoleErrorDialog-title" class="ws-title" style="text-align: left;">Login Error</h2>
                </div>
                <div class="ws-dialog-content" style="padding-bottom: 48px;">
                    <p id="adminConsoleErrorDialog-description"></p>
                    <button id="logoutButton" type="button" class="ws-btn-submit">Log out</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="javascript/admin-console-login-error-init.js"></script>
</body>
</html>
