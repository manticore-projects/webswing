<!DOCTYPE html>
<html class="ws-fullscreen" lang="en">

<head>
    <title>VBox Login</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <!--
        CSP: script-src 'self' blocks injected inline/external scripts.
        All JS lives in javascript/admin-console-login-init.js — no unsafe-inline needed.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; worker-src blob:;">
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="icon" href="favicon.ico"/>
</head>

<body>
<div class="webswing-element" data-webswing-instance="webswingInstance0">
    <div id="loading" class="ws-modal-container">
        <div class="ws-login">
            <div class="ws-login-content">
                <div class="ws-spinner">
                    <div class="ws-spinner-dot-1"></div>
                    <div class="ws-spinner-dot-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="adminConsoleErrorDialog" class="ws-modal-container"
     role="dialog"
     aria-labelledby="adminConsoleErrorDialog-title"
     aria-describedby="adminConsoleErrorDialog-description">
    <div class="ws-dialog">
        <div data-id="header" class="ws-header">
            <h2 id="adminConsoleErrorDialog-title" class="ws-title">Error</h2>
        </div>
        <div class="ws-dialog-content">
            <p id="adminConsoleErrorDialog-description"></p>
        </div>
    </div>
</div>

<!--
    Single external script covers all init logic (helpers, webswingInstance0,
    XHR calls, and the webswing-embed.js loader).
    data-webswing-global-var tells webswing-embed.js to expose its API as window.webswing.
-->
<script data-webswing-global-var="webswing" src="webswing-loader-stub.js"></script>
<script src="javascript/admin-console-login-init.js"></script>
</body>

</html>
